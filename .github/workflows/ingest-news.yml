name: Ingest News Articles

on:
  schedule:
    # Run every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news ingestion
        env:
          RSS_FEEDS: ${{ secrets.RSS_FEEDS }}
          NEWS_KEYWORDS: ${{ secrets.NEWS_KEYWORDS }}
          NEWS_API_URL: ${{ secrets.NEWS_API_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_API_QUERY: ${{ secrets.NEWS_API_QUERY }}
        run: npm run ingest

      - name: Check for new articles
        id: check_changes
        run: |
          if git diff --quiet content/posts/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New articles ingested:"
            git diff --name-only content/posts/ | head -20
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add content/posts/
          git commit -m "chore: ingest new articles from RSS feeds [skip ci]"
          git push

      - name: Create deployment
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "New articles have been ingested and committed."
          echo "Deployment will be triggered automatically by your hosting provider."
